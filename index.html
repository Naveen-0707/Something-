<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain — Local-First Notes</title>
  <meta name="description" content="A local-first second brain: wiki-links, backlinks, full-text search, and a graph view. No backend, your data stays in your browser." />
  <link rel="stylesheet" href="styles.css?v=7" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <header class="sidebar-head">
        <h1>🧠 Second Brain</h1>
        <button id="newNoteBtn" class="btn primary" title="New note (Ctrl+N)">+ New</button>
      </header>

      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search notes…  (Ctrl+K)" autocomplete="off" />
      </div>

      <div id="tagBar" class="tag-bar"></div>

      <nav id="noteList" class="note-list" aria-label="Notes"></nav>

      <footer class="sidebar-foot">
        <button id="graphBtn" class="btn ghost" title="Toggle graph view (Ctrl+G)">🕸 Graph</button>
        <button id="exportBtn" class="btn ghost" title="Export all notes as JSON">⬇ Export</button>
        <button id="importBtn" class="btn ghost" title="Import notes from JSON">⬆ Import</button>
        <input id="importFile" type="file" accept="application/json" hidden />
      </footer>
    </aside>

    <div id="backdrop" class="backdrop"></div>

    <!-- Main editor / preview -->
    <main id="main">
      <section id="editorView">
        <div class="editor-bar">
          <button id="menuBtn" class="btn ghost menu-btn" title="Menu" aria-label="Toggle sidebar">☰</button>
          <input id="titleInput" class="title-input" placeholder="Untitled note" />
          <div class="editor-actions">
            <span id="savedHint" class="saved-hint"></span>
            <button id="previewToggle" class="btn ghost" title="Toggle preview (Ctrl+E)">👁 Preview</button>
            <div class="more-wrap">
              <button id="moreBtn" class="btn ghost more-btn" title="More actions" aria-label="More actions">⋯</button>
              <div id="moreMenu" class="more-menu" hidden>
                <button id="pinBtn" class="btn ghost" title="Pin note to top">📌 Pin</button>
                <button id="summarizeBtn" class="btn ghost" title="Summarize this note">✨ Summarize</button>
                <button id="exportOneBtn" class="btn ghost" title="Export this note as Markdown">⬇ Export .md</button>
                <button id="deleteBtn" class="btn danger" title="Delete note">🗑 Delete</button>
              </div>
            </div>
          </div>
        </div>

        <div class="editor-body">
          <textarea id="bodyInput" class="body-input" spellcheck="true"
            placeholder="Write in Markdown. Link other notes with [[Note Title]].&#10;&#10;Try: # Heading, **bold**, *italic*, `code`, - lists"></textarea>
          <div id="preview" class="preview" hidden></div>
        </div>

        <div id="smartPanel" class="smart-panel"></div>
        <div id="backlinks" class="backlinks"></div>
      </section>

      <!-- Graph overlay -->
      <section id="graphView" class="graph-view" hidden>
        <div class="graph-head">
          <span>🕸 Knowledge Graph — <span id="graphStats"></span></span>
          <button id="closeGraph" class="btn ghost">✕ Close</button>
        </div>
        <canvas id="graphCanvas"></canvas>
        <p class="graph-hint">Drag nodes • Scroll to zoom • Tap a node to open it &nbsp;|&nbsp; — your links &nbsp; ⋯ suggested by content</p>
      </section>
    </main>
  </div>

  <div id="emptyState" class="empty-state" hidden>
    <div>
      <h2>Your second brain is empty</h2>
      <p>Create a note and connect ideas with <code>[[wiki-links]]</code>.</p>
      <button id="emptyNewBtn" class="btn primary">+ Create your first note</button>
      <button id="seedBtn" class="btn ghost">Load example notes</button>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <div id="buildBadge" class="build-badge"></div>

  <script src="app.js?v=7"></script>
</body>
</html>
